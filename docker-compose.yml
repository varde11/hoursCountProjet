services:
  imagehours:
    build: ./app
      
    image: varde11/imagehours
    container_name: containerhours
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

    
    healthcheck:
      
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/healthy')\" || exit 1"]
      interval: 15s       
      timeout: 5s         
      retries: 3          
      start_period: 900s


    environment:
      DATABASE_URL: ${DATABASE_URL}
      GROQ_API_KEY: ${GROQ_API_KEY}
      
  
  ui:
    image: varde11/hours_ui
    build: ./ui
    container_name: containerhoursui
    ports:
      - "8501:8501"
    environment:
      API_URL: ${API_URL}
    depends_on:
      - imagehours

  db:
    image: postgres:17
    container_name: hours_database
    ports:
      - "5433:5432"
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: hours_database
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d hours_database"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./initdb:/docker-entrypoint-initdb.d

volumes:
  postgres_data: